document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

t(:defined){visibility:hidden}\ndeck-stage{--w:1920px;--h:1080px}\n\nsection{font-family:var(--sans);color:var(--fg-1);overflow:hidden;background:var(--paper)}\nsection.dark{background:var(--navy);color:var(--fg-inv)}\n.fill{position:absolute;inset:0}\n\n/* ---------------- chrome ---------------- */\n.pad{position:absolute;inset:0;padding:84px 104px}\n.ctop{position:absolute;top:46px;left:104px;right:104px;display:flex;align-items:center;justify-content:space-between}\n.cbot{position:absolute;bottom:42px;left:104px;right:104px;display:flex;align-items:center;justify-content:space-between;font-size:15px;color:var(--fg-3);letter-spacing:.02em}\n.dark .cbot{color:var(--fg-inv-3)}\n.brand{display:flex;align-items:center;gap:14px}\n.bmark{width:42px;height:42px;border-radius:9px;background:var(--blue);display:grid;place-items:center;box-shadow:var(--sh-1);flex:0 0 auto}\n.bmark img{width:30px;height:30px;display:block}\n.brand .bt{font-size:14px;font-weight:700;letter-spacing:.2em;color:var(--fg-2)}\n.brand .bs{font-size:12px;font-weight:600;letter-spacing:.2em;color:var(--fg-4);text-transform:uppercase}\n.dark .brand .bt{color:#fff}.dark .brand .bs{color:var(--fg-inv-3)}\n.pageno{font-family:var(--mono);font-size:15px;color:var(--fg-3);letter-spacing:.04em;display:flex;align-items:center;gap:12px}\n.dark .pageno{color:var(--fg-inv-2)}\n.pageno b{color:var(--blue);font-weight:700}\n.dark .pageno b{color:var(--yellow)}\n\n/* technical ribbon */\n.ribbon{position:absolute;left:0;right:0;height:6px;display:flex}\n.ribbon i{height:100%}\n.ribbon i:nth-child(1){flex:1;background:var(--blue)}\n.ribbon i:nth-child(2){width:120px;background:var(--red)}\n.ribbon i:nth-child(3){width:64px;background:var(--yellow)}\n.ribbon.top{top:0}.ribbon.bottom{bottom:0}\n\n/* ---------------- type ---------------- */\n.eyebrow{font-size:16px;font-weight:700;letter-spacing:.24em;text-transform:uppercase;color:var(--blue);display:flex;align-items:center;gap:14px}\n.eyebrow::before{content:\"\";width:34px;height:3px;background:var(--red);border-radius:2px}\n.dark .eyebrow{color:var(--yellow)}.dark .eyebrow::before{background:var(--red)}\n.htitle{font-size:60px;line-height:1.04;font-weight:700;letter-spacing:-.02em;color:var(--fg-1);text-wrap:balance}\n.dark .htitle{color:#fff}\n.htitle .hl{color:var(--blue)}.dark .htitle .hl{color:var(--yellow)}\n.lead{font-size:24px;line-height:1.5;color:var(--fg-2);font-weight:400;max-width:1100px;text-wrap:pretty}\n.dark .lead{color:var(--fg-inv-2)}\n\n/* ---------------- icons ---------------- */\n.ico{width:1em;height:1em;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;display:block}\n\n/* ---------------- cards ---------------- */\n.card{background:var(--paper);border:1px solid var(--line);border-radius:14px;box-shadow:var(--sh-1)}\n.chip{display:inline-flex;align-items:center;gap:9px;padding:8px 15px;border-radius:999px;font-size:15px;font-weight:600;letter-spacing:.01em}\n\n/* icon tile */\n.itile{width:58px;height:58px;border-radius:13px;display:grid;place-items:center;flex:0 0 auto;font-size:30px}\n.itile.blue{background:var(--blue-tint);color:var(--blue)}\n.itile.red{background:#FCE7E8;color:var(--red)}\n.itile.navy{background:var(--navy);color:#fff}\n.itile.yellow{background:#FFF3D1;color:var(--yellow-deep)}\n\n/* slide 4 — pillar rows */\n.q-row{display:flex;align-items:center;gap:13px;padding:11px 0;border-top:1px solid var(--line);font-size:18px;color:var(--fg-2)}\n.q-row svg{font-size:22px;flex:0 0 auto}\n.q-row b{color:var(--fg-1);font-weight:700}\n\n/* slide 5 — mapping table */\n.maptbl .trow{display:grid;grid-template-columns:300px 1fr 1.05fr;align-items:center;border-top:1px solid var(--line)}\n.maptbl .trow>div{padding:18px 26px;font-size:18px;color:var(--fg-2)}\n.maptbl .thead{background:var(--navy);border-top:none}\n.maptbl .thead>div{color:#fff;font-size:14px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;padding-top:18px;padding-bottom:18px}\n.maptbl .trow:nth-child(even){background:var(--paper-2)}\n.maptbl .bcell{display:flex;align-items:center;gap:16px;font-size:21px;font-weight:700;color:var(--fg-1)}\n.itile.tb{width:46px;height:46px;border-radius:11px;font-size:24px}\n.tg{display:inline-block;background:var(--blue-tint);color:var(--blue-700);font-size:14px;font-weight:600;padding:5px 12px;border-radius:999px;margin:3px 6px 3px 0}\n\n/* slide 6 — end-to-end flow */\n.flow7{display:grid;grid-template-columns:repeat(7,1fr);gap:0;position:relative}\n.flow7::before{content:\"\";position:absolute;top:31px;left:7%;right:7%;height:3px;background:linear-gradient(90deg,var(--blue),var(--blue) 70%,var(--yellow));z-index:0;border-radius:2px}\n.fstep{position:relative;z-index:1;text-align:center;padding:0 12px}\n.fnum{width:62px;height:62px;border-radius:50%;background:#fff;border:3px solid var(--blue);color:var(--blue);font-family:var(--mono);font-weight:700;font-size:20px;display:grid;place-items:center;margin:0 auto}\n.fic{width:54px;height:54px;border-radius:13px;background:var(--blue-tint);color:var(--blue);display:grid;place-items:center;font-size:28px;margin:20px auto 16px}\n.fstep:last-child .fnum{border-color:var(--yellow-deep);color:var(--yellow-deep)}\n.fstep:last-child .fic{background:#FFF3D1;color:var(--yellow-deep)}\n.ft{font-size:18px;font-weight:700;color:var(--fg-1);line-height:1.25;margin-bottom:7px;text-wrap:balance}\n.fd{font-size:14.5px;color:var(--fg-3);line-height:1.4}\n\n/* slide 7 — architecture */\n.arch{display:flex;align-items:stretch;gap:8px}\n.anode{flex:1;background:var(--paper);border:1px solid var(--line);border-radius:14px;box-shadow:var(--sh-1);padding:22px 16px;text-align:center;display:flex;flex-direction:column;align-items:center}\n.aic{width:62px;height:62px;border-radius:14px;display:grid;place-items:center;font-size:32px;margin-bottom:14px}\n.aic.blue{background:var(--blue-tint);color:var(--blue)}\n.aic.yellow{background:#FFF3D1;color:var(--yellow-deep)}\n.aic.navy{background:var(--navy);color:#fff}\n.aic.red{background:#FCE7E8;color:var(--red)}\n.att{font-size:17px;font-weight:700;color:var(--fg-1);line-height:1.25;margin-bottom:6px;text-wrap:balance}\n.asub{font-size:13.5px;color:var(--fg-3);line-height:1.35}\n.aarrow{flex:0 0 30px;display:grid;place-items:center;color:var(--blue);font-size:24px}\n.sens{background:var(--paper-2);border:1px solid var(--line);border-radius:12px;padding:16px 12px;display:flex;flex-direction:column;align-items:center;text-align:center}\n.sens svg{font-size:28px;color:var(--blue);margin-bottom:9px}\n.sens span{font-family:var(--mono);font-size:15px;font-weight:700;color:var(--fg-1)}\n.sens em{font-style:normal;font-size:13px;color:var(--fg-3);margin-top:3px}\n\n/* slide 8 — features + mockup */\n.feat{display:flex;align-items:center;gap:14px;font-size:18px;color:var(--fg-2);font-weight:500}\n.feat svg{font-size:22px;color:var(--blue);flex:0 0 auto}\n.mock{border-radius:14px;overflow:hidden;border:1px solid var(--line-2);box-shadow:var(--sh-3);background:#fff}\n.mockbar{height:40px;background:var(--paper-3);display:flex;align-items:center;gap:8px;padding:0 16px;border-bottom:1px solid var(--line)}\n.dot{width:11px;height:11px;border-radius:50%;flex:0 0 auto}\n.murl{margin-left:14px;font-family:var(--mono);font-size:13px;color:var(--fg-3);background:#fff;border:1px solid var(--line);border-radius:6px;padding:4px 14px}\n.mockbody{padding:20px 22px;background:var(--paper-2)}\n.mtop{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}\n.mlogo{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:700;color:var(--fg-1)}\n.mlive{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:13px;color:var(--ok)}\n.lvdot{width:8px;height:8px;border-radius:50%;background:var(--ok);box-shadow:0 0 0 4px rgba(31,138,92,.16)}\n.mkpi{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px}\n.kc{background:#fff;border:1px solid var(--line);border-radius:10px;padding:13px 14px}\n.kc.dark{background:var(--navy);border-color:transparent}\n.ke{font-size:10px;font-weight:700;letter-spacing:.12em;color:var(--fg-3)}\n.kc.dark .ke{color:rgba(255,255,255,.6)}\n.kv{font-size:27px;font-weight:700;letter-spacing:-.01em;color:var(--fg-1);margin-top:3px}\n.kc.dark .kv{color:#fff}\n.kv small{font-size:13px;color:var(--fg-3);font-weight:600;margin-left:3px}\n.kc.dark .kv small{color:rgba(255,255,255,.6)}\n.kf{font-family:var(--mono);font-size:11.5px;color:var(--fg-3);margin-top:7px}\n.kf.ok{color:var(--ok)}.kf.warn{color:var(--warn)}.kf.yel{color:var(--yellow-deep)}\n.mgrid{display:grid;grid-template-columns:260px 1fr;gap:12px;margin-bottom:14px}\n.mmap,.mchart{background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px}\n.mmap{height:200px;display:flex;flex-direction:column}\n.mchart{height:200px;display:flex;flex-direction:column}\n.mmlabel{font-size:10px;font-weight:700;letter-spacing:.12em;color:var(--fg-3);margin-bottom:8px}\n.mmap svg{flex:1;min-height:0}\n.mstat{background:#fff;border:1px solid var(--line);border-radius:10px;overflow:hidden}\n.srow{display:grid;grid-template-columns:1.1fr 1.2fr .8fr .8fr;align-items:center;padding:10px 16px;border-top:1px solid var(--line);font-size:14px;color:var(--fg-2)}\n.srow.shd{border-top:none;background:var(--paper-2);font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--fg-3)}\n.srow .mono{font-family:var(--mono)}\n.badge{font-size:11.5px;font-weight:700;padding:3px 11px;border-radius:999px}\n.badge.ok{background:#E3F3EB;color:var(--ok)}\n.badge.warn{background:#FBEFD9;color:var(--warn)}\n.badge.off{background:#F0E0E0;color:var(--red-deep)}\n\n/* slide 9 — benefits */\n.bene{padding:0;overflow:hidden;display:flex;flex-direction:column}\n.bhead{height:96px;display:grid;place-items:center;font-size:42px;color:#fff}\n.bhead.navy{background:var(--navy)}\n.bhead.blue{background:var(--blue)}\n.bhead.yellow{background:var(--yellow-deep)}\n.bhead.red{background:var(--red)}\n.brole{font-size:24px;font-weight:800;color:var(--fg-1);padding:22px 26px 6px;letter-spacing:-.01em}\n.bene ul{list-style:none;margin:0;padding:0 26px 26px}\n.bene li{position:relative;padding:11px 0 11px 24px;font-size:16.5px;color:var(--fg-2);line-height:1.4;border-top:1px solid var(--line)}\n.bene li:first-child{border-top:none}\n.bene li::before{content:\"\";position:absolute;left:0;top:18px;width:9px;height:9px;border-radius:50%;background:var(--blue)}\n\n/* slide 10 — roadmap */\n.road{display:grid;grid-template-columns:repeat(4,1fr);gap:22px;position:relative}\n.road::before{content:\"\";position:absolute;top:30px;left:9%;right:9%;height:3px;background:linear-gradient(90deg,var(--blue),var(--yellow));border-radius:2px;z-index:0}\n.rstep{position:relative;z-index:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.14);border-radius:14px;padding:24px 24px 26px;backdrop-filter:blur(4px)}\n.rnum{width:60px;height:60px;border-radius:50%;background:var(--blue);color:#fff;font-weight:800;font-size:24px;display:grid;place-items:center;margin-bottom:18px;box-shadow:0 0 0 6px rgba(11,91,211,.18)}\n.rstep:last-child .rnum{background:var(--yellow-deep);box-shadow:0 0 0 6px rgba(224,161,0,.18)}\n.ric{font-size:30px;color:var(--yellow);margin-bottom:12px}\n.rt{font-size:24px;font-weight:800;color:#fff;margin-bottom:8px}\n.rd{font-size:16px;color:var(--fg-inv-2);line-height:1.45}\n.closing{margin-top:46px;display:flex;gap:26px;align-items:flex-start;border-top:1px solid rgba(255,255,255,.14);padding-top:32px}\n.qbar{flex:0 0 6px;align-self:stretch;background:linear-gradient(180deg,var(--yellow),var(--red));border-radius:3px;min-height:90px}\n\n/* ---- entrance: base state is the VISIBLE end-state; animate FROM hidden ---- */\n.anim{opacity:1;transform:none}\n@keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}\n@media (prefers-reduced-motion:no-preference){\n  [data-deck-active] .anim{animation:rise .
